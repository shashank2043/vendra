spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vendra_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    # Single-machine dev: advertise loopback so gateway routing survives host IP changes
    # (Wi-Fi/VPN switches). Override EUREKA_INSTANCE_IP for real multi-host deployments.
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${random.value}

jwt:
  secret: 3c9073b83c13df425f187a2a0efc684345ff48cb6c17e3f28cf085b8823ff23f

keycloak:
  auth-server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
  realm: vendra
  client-id: vendra-client
  client-secret: vendra-client-secret
  admin:
    username: ${KEYCLOAK_ADMIN_USER:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    client-id: admin-cli

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      # Trace every request during smoke testing; lower this in production.
      probability: 1.0
  zipkin:
    tracing:
      # Overridden per-environment; docker-compose sets ZIPKIN_ENDPOINT to the zipkin container.
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
