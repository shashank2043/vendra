server:
  port: 8090

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Standard routing rules
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
          filters:
            - StripPrefix=0
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=0

        # Swagger API documentation routing rules
        - id: auth-service-swagger
          uri: lb://auth-service
          predicates:
            - Path=/swagger/auth-service/**
          filters:
            - RewritePath=/swagger/auth-service/(?<segment>.*), /${segment}

        - id: notification-service-swagger
          uri: lb://notification-service
          predicates:
            - Path=/swagger/notification-service/**
          filters:
            - RewritePath=/swagger/notification-service/(?<segment>.*), /${segment}

        - id: product-service-swagger
          uri: lb://product-service
          predicates:
            - Path=/swagger/product-service/**
          filters:
            - RewritePath=/swagger/product-service/(?<segment>.*), /${segment}

        - id: order-service-swagger
          uri: lb://order-service
          predicates:
            - Path=/swagger/order-service/**
          filters:
            - RewritePath=/swagger/order-service/(?<segment>.*), /${segment}

        - id: inventory-service-swagger
          uri: lb://inventory-service
          predicates:
            - Path=/swagger/inventory-service/**
          filters:
            - RewritePath=/swagger/inventory-service/(?<segment>.*), /${segment}

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Set-Cookie

springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /swagger/auth-service/v3/api-docs
      - name: notification-service
        url: /swagger/notification-service/v3/api-docs
      - name: product-service
        url: /swagger/product-service/v3/api-docs
      - name: order-service
        url: /swagger/order-service/v3/api-docs
      - name: inventory-service
        url: /swagger/inventory-service/v3/api-docs
    config-url: /v3/api-docs/swagger-config
  api-docs:
    enabled: true
