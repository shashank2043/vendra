server:
  port: 8089

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:payment_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# Razorpay credentials. Override with real test/live keys via environment variables.
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholdersecret}
  currency: ${RAZORPAY_CURRENCY:INR}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:whsecret}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
