version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vendra-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-vendra_db}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${DB_PASSWORD:-password}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: vendra-keycloak
    command: start-dev --import-realm
    ports:
      - "8083:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 15

  mongodb:
    image: mongo:6.0
    container_name: vendra-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: vendra-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: vendra-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: vendra-zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    container_name: vendra-config-server
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-native}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: discovery-server
    container_name: vendra-discovery-server
    ports:
      - "${DISCOVERY_SERVER_PORT:-8761}:8761"
    environment:
      EUREKA_HOSTNAME: ${EUREKA_HOSTNAME:-discovery-server}
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: vendra-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8090}:8090"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: vendra-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${AUTH_DB_NAME:-auth_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    container_name: vendra-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8082}:8082"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${NOTIFICATION_DB_NAME:-notification_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: product-service
    container_name: vendra-product-service
    ports:
      - "8084:8084"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
    depends_on:
      mongodb:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    container_name: vendra-order-service
    ports:
      - "8085:8085"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: order_db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: inventory-service
    container_name: vendra-inventory-service
    ports:
      - "8086:8086"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: inventory_db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    container_name: vendra-user-service
    ports:
      - "8087:8087"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: user_db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  review-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: review-service
    container_name: vendra-review-service
    ports:
      - "8088:8088"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
    depends_on:
      mongodb:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-service
    container_name: vendra-payment-service
    ports:
      - "8089:8089"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: payment_db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholdersecret}
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  report-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: report-service
    container_name: vendra-report-service
    ports:
      - "8092:8092"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

volumes:
  mysql_data:
  mongodb_data:
