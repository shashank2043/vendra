version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vendra-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-vendra_db}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${DB_PASSWORD:-password}"]
      interval: 5s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: config-server
    container_name: vendra-config-server
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-native}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: discovery-server
    container_name: vendra-discovery-server
    ports:
      - "${DISCOVERY_SERVER_PORT:-8761}:8761"
    environment:
      EUREKA_HOSTNAME: ${EUREKA_HOSTNAME:-discovery-server}
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: api-gateway
    container_name: vendra-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: auth-service
    container_name: vendra-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${AUTH_DB_NAME:-auth_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: notification-service
    container_name: vendra-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8082}:8082"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8888}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka/}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${NOTIFICATION_DB_NAME:-notification_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

volumes:
  mysql_data:
